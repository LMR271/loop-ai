            - paragraph [ref=f1e87]: "Across interviews people were positively surprised: setup is generally quick, intuitive, and forgiving (can be paused/resumed), and teams adopted the product to get faster, more personal feedback than static forms. Users particularly like the AI-driven conversational follow-ups and see higher engagement than traditional surveys. Primary frictions are discoverability (finding share links and where to edit questions), minor trust/clarity issues with the share-link slug, and uncertainty during setup about how many questions to add. Many users asked for clearer guidance and more obvious navigation for editing and sharing."
